# Netlify configuration for TaxWise AI Frontend
[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' localhost:8000 http://localhost:8000 https://api.taxwiseai.com;"

[context.production]
  command = "npm run build"
  environment = { VITE_API_BASE_URL = "https://api.taxwiseai.com" }

[context.preview]
  command = "npm run build"
  environment = { VITE_API_BASE_URL = "https://api-preview.taxwiseai.com" }

[context.deploy-preview]
  command = "npm run build"
  environment = { VITE_API_BASE_URL = "http://localhost:8000" }
